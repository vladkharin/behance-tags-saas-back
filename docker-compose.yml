version: '3.8'

services:
  # База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: behance_postgres
    restart: always
    environment:
      POSTGRES_USER: vladharin
      POSTGRES_PASSWORD: "2001"
      POSTGRES_DB: behance_tags_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Кэш и очереди Redis
  redis:
    image: redis:7-alpine
    container_name: behance_redis
    restart: always
    ports:
      - "6379:6379"

  # Наш NestJS бэкенд
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: behance_api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      # Указываем хосты внутри сети Docker
      - DATABASE_URL=postgresql://vladharin:2001@postgres:5432/behance_tags_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

  prisma-studio:
    image: node:20-alpine # используй тот же образ, что для билда бэкенда
    working_dir: /app
    volumes:
      - .:/app # Монтируем папку с кодом, чтобы студия видела schema.prisma
    environment:
      - DATABASE_URL=postgresql://vladharin:2001@postgres:5432/behance_tags_db?schema=public # Берем URL базы из .env
    ports:
      - "5555:5555"
    command: npx prisma studio --browser none --hostname 0.0.0.0

volumes:
  postgres_data: